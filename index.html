<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SECJUR — Team Baseball Cards</title>
<style>
:root{--navy:#0f1f3d;--pink:#e8005a;--violet:#6b2d8b;--light:#f4f6fa;--white:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--r:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--light);color:var(--text);min-height:100vh}
header{background:var(--navy);padding:2.25rem 2rem 1.75rem;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(107,45,139,.35) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(232,0,90,.2) 0%,transparent 60%);pointer-events:none}
header h1{color:#fff;font-size:1.9rem;font-weight:800;letter-spacing:-.5px;position:relative}
.brand{color:var(--pink)}
header p{color:rgba(255,255,255,.55);margin-top:.35rem;font-size:.92rem;position:relative}
.lang-btn{position:absolute;top:1.1rem;right:1.25rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:.78rem;font-weight:700;padding:.3rem .75rem;border-radius:20px;cursor:pointer;z-index:10}
.lang-btn:hover{background:rgba(255,255,255,.22)}
.toolbar{display:flex;gap:.75rem;align-items:center;justify-content:center;flex-wrap:wrap;padding:1.4rem 1.5rem .5rem;max-width:1400px;margin:0 auto}
.search-wrap{position:relative;flex:1;max-width:340px}
.search-wrap svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.search-wrap input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:.55rem .9rem .55rem 2.25rem;font-size:.9rem;outline:none;background:var(--white)}
.search-wrap input:focus{border-color:var(--pink)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.25rem;padding:1rem 1.5rem 6rem;max-width:1400px;margin:0 auto}
.card{background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.13)}
.card-stripe{height:5px;background:linear-gradient(90deg,var(--pink),var(--violet))}
.card-body{padding:1.25rem;flex:1;display:flex;flex-direction:column;gap:.85rem}
.card-header{display:flex;align-items:center;gap:.9rem}
.avatar,.avatar-ph{width:58px;height:58px;border-radius:50%;flex-shrink:0}
.avatar{object-fit:cover;border:2.5px solid var(--border)}
.avatar-ph{background:linear-gradient(135deg,var(--navy),var(--violet));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;font-weight:700}
.card-name h2{font-size:1rem;font-weight:700;line-height:1.25}
.dept-badge{display:inline-block;margin-top:.25rem;background:color-mix(in srgb,var(--violet) 11%,transparent);color:var(--violet);font-size:.68rem;font-weight:700;padding:.18rem .55rem;border-radius:20px;text-transform:uppercase;letter-spacing:.6px}
.sec-label{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.3rem}
.tags{display:flex;flex-wrap:wrap;gap:.3rem}
.tag{background:var(--light);border:1px solid var(--border);border-radius:6px;font-size:.78rem;padding:.18rem .5rem}
.tag.hl{background:color-mix(in srgb,var(--pink) 9%,transparent);border-color:color-mix(in srgb,var(--pink) 28%,transparent);color:var(--pink);font-weight:600}
.card-footer{padding:.7rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.edit-btn{background:none;border:1.5px solid var(--border);color:var(--muted);font-size:.75rem;font-weight:600;padding:.28rem .7rem;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:.35rem;transition:all .15s}
.edit-btn:hover{border-color:var(--violet);color:var(--violet);background:color-mix(in srgb,var(--violet) 6%,transparent)}
.edit-btn svg{width:12px;height:12px}
.state{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--muted)}
.fab{position:fixed;bottom:2rem;right:2rem;z-index:100;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--violet));color:#fff;font-size:1.8rem;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(232,0,90,.45);display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:hover{transform:scale(1.08)}
.overlay{position:fixed;inset:0;background:rgba(10,15,30,.55);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:1.5rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:860px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden}
.modal-header{background:var(--navy);padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.modal-header h2{color:#fff;font-size:1.05rem;font-weight:700}
.modal-header h2 span{color:var(--pink)}
.close-btn{background:rgba(255,255,255,.12);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{display:grid;grid-template-columns:1fr 1fr}
@media(max-width:620px){.modal-body{grid-template-columns:1fr}}
.form-side{padding:1.5rem;border-right:1px solid var(--border)}
.form-side h3{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:1rem}
.field{margin-bottom:.9rem}
.field label{display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem}
.field input,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-size:.88rem;outline:none;font-family:inherit;resize:none}
.field input:focus,.field textarea:focus{border-color:var(--pink)}
.photo-zone{border:2px dashed var(--border);border-radius:10px;padding:.65rem;cursor:pointer;transition:all .2s;position:relative;background:var(--light)}
.photo-zone:hover,.photo-zone.drag-over{border-color:var(--violet);background:color-mix(in srgb,var(--violet) 5%,transparent)}
.photo-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-zone-inner{display:flex;align-items:center;gap:.65rem;pointer-events:none}
.photo-zone-thumb{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--violet));display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.photo-zone-thumb img{width:100%;height:100%;object-fit:cover}
.photo-zone-thumb svg{width:16px;height:16px;opacity:.7}
.photo-zone-text strong{display:block;font-size:.8rem;color:var(--text)}
.photo-zone-text span{font-size:.7rem;color:var(--muted)}
.photo-clear{position:absolute;top:.3rem;right:.3rem;background:rgba(232,0,90,.12);border:none;color:var(--pink);width:18px;height:18px;border-radius:50%;font-size:.7rem;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2;pointer-events:all}
.photo-clear.visible{display:flex}
.save-area{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
.save-btn{flex:1;background:linear-gradient(135deg,var(--pink),var(--violet));color:#fff;border:none;border-radius:10px;padding:.65rem 1.25rem;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .15s,background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.save-btn:hover{opacity:.9}
.save-btn:disabled{opacity:.5;cursor:not-allowed}
.save-btn.success{background:linear-gradient(135deg,#059669,#10b981)}
.save-btn.error{background:linear-gradient(135deg,#dc2626,#ef4444)}
.save-status{font-size:.78rem;color:var(--muted);flex-shrink:0;max-width:200px;text-align:right;line-height:1.3}
.preview-side{padding:1.5rem;background:var(--light);display:flex;flex-direction:column;gap:.9rem}
.preview-side h3{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
footer{text-align:center;padding:1.5rem;color:var(--muted);font-size:.8rem}
</style>
</head>
<body>
<header>
  <button class="lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
  <h1><span class="brand">SECJUR</span> &#8212; <span id="h-title">Mitarbeiter Baseball Cards</span></h1>
  <p id="h-sub">Wer macht was? Alle Kolleginnen und Kollegen auf einen Blick.</p>
</header>
<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Name, Team oder Thema ..." oninput="filterCards()"/>
  </div>
</div>
<div class="grid" id="grid"><div class="state">Lade Cards ...</div></div>
<footer id="footer-hint">Klicke auf <strong>+</strong> um deine eigene Card hinzuzuf&#252;gen.</footer>
<button class="fab" onclick="openModal(null)">+</button>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Deine <span>Baseball Card</span> erstellen</h2>
      <button class="close-btn" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="form-side">
        <h3 id="form-title">Deine Daten</h3>
        <div class="field"><label id="l-name">Name *</label><input id="f-name" type="text" oninput="updatePreview()"/></div>
        <div class="field">
          <label id="l-photo">Foto</label>
          <div class="photo-zone" id="photo-zone" ondragover="photoDragOver(event)" ondragleave="photoDragLeave()" ondrop="photoDrop(event)">
            <input type="file" accept="image/*" onchange="photoFileChange(event)" id="photo-file-input"/>
            <button class="photo-clear" id="photo-clear" onclick="photoClear(event)">&#x2715;</button>
            <div class="photo-zone-inner">
              <div class="photo-zone-thumb" id="photo-thumb">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              </div>
              <div class="photo-zone-text">
                <strong id="photo-zone-main">Foto ablegen oder klicken</strong>
                <span id="photo-zone-sub">JPG, PNG, WEBP &bull; wird verkleinert</span>
              </div>
            </div>
          </div>
        </div>
        <div class="field"><label id="l-dept">Team / Department *</label><input id="f-dept" type="text" oninput="updatePreview()"/></div>
        <div class="field"><label id="l-tasks">Aufgaben *</label><textarea id="f-tasks" rows="3" oninput="updatePreview()"></textarea></div>
        <div class="field"><label id="l-contact">Ansprechpartner f&#252;r *</label><textarea id="f-contact" rows="3" oninput="updatePreview()"></textarea></div>
      </div>
      <div class="preview-side">
        <h3 id="preview-title">Vorschau</h3>
        <div id="card-preview"></div>
      </div>
    </div>
    <div class="save-area">
      <button class="save-btn" id="save-btn" onclick="saveCard()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        <span id="save-btn-text">Speichern</span>
      </button>
      <div class="save-status" id="save-status"></div>
    </div>
  </div>
</div>

<script>
var lang = "de";
var isEditMode = false;
var editOriginalName = null;
var currentPhoto = "";

var L = {
  de:{
    title:"Mitarbeiter Baseball Cards", sub:"Wer macht was? Alle Kolleginnen und Kollegen auf einen Blick.",
    search:"Name, Team oder Thema ...", footer:"Klicke auf <strong>+</strong> um deine eigene Card hinzuzufügen.",
    mTitleNew:"Deine <span>Baseball Card</span> erstellen", mTitleEdit:"Card <span>bearbeiten</span>",
    fTitleNew:"Deine Daten", fTitleEdit:"Daten bearbeiten",
    lName:"Name *", lPhoto:"Foto", lDept:"Team / Department *", lTasks:"Aufgaben *", lContact:"Ansprechpartner für *",
    phName:"Vorname Nachname", phDept:"z.B. Customer Success",
    phTasks:"Eine Aufgabe pro Zeile", phContact:"Ein Thema pro Zeile",
    photoMain:"Foto ablegen oder klicken", photoSub:"JPG, PNG, WEBP · wird verkleinert",
    photoLoaded:"Foto geladen", photoLoadedSub:"Klicken zum Ändern",
    prevTitle:"Vorschau",
    saveBtn:"Speichern", saving:"Wird gespeichert…", saved:"Gespeichert ✓", saveErr:"Fehler — bitte erneut versuchen",
    editBtn:"Bearbeiten", secTasks:"Aufgaben", secContact:"Ansprechpartner für",
    empty:"Keine Ergebnisse.", defName:"Dein Name",
    errRequired:"Name und Department sind Pflichtfelder."
  },
  en:{
    title:"Team Baseball Cards", sub:"Who does what? All colleagues at a glance.",
    search:"Name, team or topic ...", footer:"Click <strong>+</strong> to add your own card.",
    mTitleNew:"Create your <span>Baseball Card</span>", mTitleEdit:"Edit <span>Card</span>",
    fTitleNew:"Your Details", fTitleEdit:"Edit Details",
    lName:"Name *", lPhoto:"Photo", lDept:"Team / Department *", lTasks:"Responsibilities *", lContact:"Go-to person for *",
    phName:"First Last", phDept:"e.g. Customer Success",
    phTasks:"One item per line", phContact:"One topic per line",
    photoMain:"Drop photo or click", photoSub:"JPG, PNG, WEBP · auto-resized",
    photoLoaded:"Photo loaded", photoLoadedSub:"Click to change",
    prevTitle:"Preview",
    saveBtn:"Save", saving:"Saving…", saved:"Saved ✓", saveErr:"Error — please try again",
    editBtn:"Edit", secTasks:"Responsibilities", secContact:"Go-to person for",
    empty:"No results.", defName:"Your Name",
    errRequired:"Name and Department are required."
  }
};
function t(k){ return L[lang][k]||k; }

function applyLang(){
  document.documentElement.lang=lang;
  document.getElementById("lang-btn").textContent=lang==="de"?"EN":"DE";
  document.getElementById("h-title").textContent=t("title");
  document.getElementById("h-sub").textContent=t("sub");
  document.getElementById("search").placeholder=t("search");
  document.getElementById("footer-hint").innerHTML=t("footer");
  document.getElementById("l-name").textContent=t("lName");
  document.getElementById("l-photo").textContent=t("lPhoto");
  document.getElementById("l-dept").textContent=t("lDept");
  document.getElementById("l-tasks").textContent=t("lTasks");
  document.getElementById("l-contact").textContent=t("lContact");
  document.getElementById("f-name").placeholder=t("phName");
  document.getElementById("f-dept").placeholder=t("phDept");
  document.getElementById("f-tasks").placeholder=t("phTasks");
  document.getElementById("f-contact").placeholder=t("phContact");
  document.getElementById("preview-title").textContent=t("prevTitle");
  document.getElementById("save-btn-text").textContent=t("saveBtn");
  updatePhotoZoneText();
  setModalMode(isEditMode);
  filterCards(); updatePreview();
}
function toggleLang(){ lang=lang==="de"?"en":"de"; applyLang(); }
function setModalMode(edit){
  isEditMode=edit;
  document.getElementById("modal-title").innerHTML=edit?t("mTitleEdit"):t("mTitleNew");
  document.getElementById("form-title").textContent=edit?t("fTitleEdit"):t("fTitleNew");
}

/* Photo */
function resizeImage(file,cb){
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var s=200,sx=0,sy=0,sw=img.width,sh=img.height;
      if(sw>sh){sx=Math.floor((sw-sh)/2);sw=sh;}else{sy=Math.floor((sh-sw)/2);sh=sw;}
      var c=document.createElement("canvas");c.width=s;c.height=s;
      c.getContext("2d").drawImage(img,sx,sy,sw,sh,0,0,s,s);
      cb(c.toDataURL("image/jpeg",.75));
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}
function setPhoto(url){
  currentPhoto=url;
  document.getElementById("photo-thumb").innerHTML="<img src='"+url+"' alt=''/>";
  document.getElementById("photo-zone-main").textContent=t("photoLoaded");
  document.getElementById("photo-zone-sub").textContent=t("photoLoadedSub");
  document.getElementById("photo-clear").classList.add("visible");
  updatePreview();
}
function updatePhotoZoneText(){
  document.getElementById("photo-zone-main").textContent=currentPhoto?t("photoLoaded"):t("photoMain");
  document.getElementById("photo-zone-sub").textContent=currentPhoto?t("photoLoadedSub"):t("photoSub");
}
function photoDragOver(e){e.preventDefault();document.getElementById("photo-zone").classList.add("drag-over");}
function photoDragLeave(){document.getElementById("photo-zone").classList.remove("drag-over");}
function photoDrop(e){
  e.preventDefault();document.getElementById("photo-zone").classList.remove("drag-over");
  var f=e.dataTransfer.files[0];if(f&&f.type.startsWith("image/"))resizeImage(f,setPhoto);
}
function photoFileChange(e){var f=e.target.files[0];if(f)resizeImage(f,setPhoto);}
function photoClear(e){
  e.stopPropagation();currentPhoto="";
  document.getElementById("photo-thumb").innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>';
  document.getElementById("photo-clear").classList.remove("visible");
  document.getElementById("photo-file-input").value="";
  updatePhotoZoneText();updatePreview();
}

/* Cards */
var allCards=[];
function loadCards(){
  fetch("people/cards.json?t="+Date.now())
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(d){
      allCards=d.sort(function(a,b){return a.name.localeCompare(b.name,"de");});
      renderCards(allCards);
    })
    .catch(function(){document.getElementById("grid").innerHTML="<div class='state'>Konnte cards.json nicht laden.</div>";});
}
function ini(n){return(n||"?").split(" ").map(function(p){return p[0];}).slice(0,2).join("").toUpperCase();}
var PENCIL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
function buildCard(c,idx){
  var ph="<div class='avatar-ph'>"+ini(c.name)+"</div>";
  var photo=c.photo?"<img class='avatar' src='"+c.photo+"' alt='"+(c.name||"")+"'/>":ph;
  var tasks=(c.aufgaben||[]).map(function(x){return"<span class='tag'>"+x+"</span>";}).join("");
  var contact=(c.ansprechpartner_fuer||[]).map(function(x){return"<span class='tag hl'>"+x+"</span>";}).join("");
  var ec=idx!==undefined?"openModal(allCards["+idx+"])":"openModal(null)";
  return"<div class='card'><div class='card-stripe'></div><div class='card-body'>"+
    "<div class='card-header'>"+photo+"<div class='card-name'><h2>"+(c.name||"—")+"</h2>"+
    "<span class='dept-badge'>"+(c.department||"")+"</span></div></div>"+
    (tasks?"<div><div class='sec-label'>"+t("secTasks")+"</div><div class='tags'>"+tasks+"</div></div>":"")+
    (contact?"<div><div class='sec-label'>"+t("secContact")+"</div><div class='tags'>"+contact+"</div></div>":"")+
    "</div><div class='card-footer'><button class='edit-btn' onclick='"+ec+"'>"+PENCIL+"<span>"+t("editBtn")+"</span></button></div></div>";
}
function renderCards(cards){
  var g=document.getElementById("grid");
  if(!cards.length){g.innerHTML="<div class='state'>"+t("empty")+"</div>";return;}
  g.innerHTML=cards.map(function(c){return buildCard(c,allCards.indexOf(c));}).join("");
}
function filterCards(){
  var q=(document.getElementById("search").value||"").toLowerCase();
  if(!q){renderCards(allCards);return;}
  renderCards(allCards.filter(function(c){
    return[c.name,c.department].concat(c.aufgaben||[]).concat(c.ansprechpartner_fuer||[]).join(" ").toLowerCase().indexOf(q)>-1;
  }));
}

function openModal(card){
  var edit=!!card;setModalMode(edit);
  editOriginalName=edit?card.name:null;
  currentPhoto="";
  document.getElementById("photo-clear").classList.remove("visible");
  document.getElementById("photo-file-input").value="";
  var ph=document.getElementById("photo-thumb");
  ph.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>';
  if(edit){
    document.getElementById("f-name").value=card.name||"";
    document.getElementById("f-dept").value=card.department||"";
    document.getElementById("f-tasks").value=(card.aufgaben||[]).join("\n");
    document.getElementById("f-contact").value=(card.ansprechpartner_fuer||[]).join("\n");
    if(card.photo){currentPhoto=card.photo;ph.innerHTML="<img src='"+card.photo+"' alt=''/>";document.getElementById("photo-clear").classList.add("visible");}
  } else {
    ["f-name","f-dept","f-tasks","f-contact"].forEach(function(id){document.getElementById(id).value="";});
  }
  updatePhotoZoneText();
  var b=document.getElementById("save-btn");b.className="save-btn";b.disabled=false;
  document.getElementById("save-btn-text").textContent=t("saveBtn");
  document.getElementById("save-status").textContent="";
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow="hidden";
  updatePreview();
}
function closeModal(){document.getElementById("overlay").classList.remove("open");document.body.style.overflow="";}

function getLines(id){return document.getElementById(id).value.split("\n").map(function(l){return l.trim();}).filter(Boolean);}
function updatePreview(){
  var c={name:document.getElementById("f-name").value.trim()||t("defName"),photo:currentPhoto,
    department:document.getElementById("f-dept").value.trim()||"Team",
    aufgaben:getLines("f-tasks"),ansprechpartner_fuer:getLines("f-contact")};
  document.getElementById("card-preview").innerHTML=buildCard(c);
}

function saveCard(){
  var c={
    name:document.getElementById("f-name").value.trim(),
    photo:currentPhoto,
    department:document.getElementById("f-dept").value.trim(),
    aufgaben:getLines("f-tasks"),
    ansprechpartner_fuer:getLines("f-contact")
  };
  if(!c.name||!c.department){
    document.getElementById("save-status").textContent=t("errRequired");return;
  }
  var btn=document.getElementById("save-btn");
  btn.disabled=true;btn.className="save-btn";
  document.getElementById("save-btn-text").textContent=t("saving");
  document.getElementById("save-status").textContent="";

  fetch("/.netlify/functions/save-cards",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({card:c,originalName:editOriginalName,isEdit:isEditMode})
  })
  .then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d};});})
  .then(function(res){
    if(!res.ok) throw new Error(res.data.error||"Unknown error");
    btn.className="save-btn success";btn.disabled=false;
    document.getElementById("save-btn-text").textContent=t("saved");
    loadCards();
    setTimeout(function(){closeModal();},1100);
  })
  .catch(function(e){
    btn.className="save-btn error";btn.disabled=false;
    document.getElementById("save-btn-text").textContent=t("saveErr");
    document.getElementById("save-status").textContent=String(e.message).substring(0,80);
  });
}

document.addEventListener("error",function(e){
  if(e.target&&e.target.className==="avatar"){
    var d=document.createElement("div");d.className="avatar-ph";d.textContent=ini(e.target.alt||"");
    if(e.target.parentNode)e.target.parentNode.replaceChild(d,e.target);
  }
},true);

loadCards();updatePreview();
</script>
</body>
</html>
